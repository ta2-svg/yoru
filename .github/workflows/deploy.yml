name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --ignore-engines

      - name: Install web dependencies
        run: yarn add --ignore-engines react-dom react-native-web @expo/metro-runtime

      - name: Build web
        run: npx expo export --platform web

      - name: Fix asset paths for GitHub Pages
        run: |
          sed -i 's|src="/_expo/|src="/yoru/_expo/|g' dist/index.html
          sed -i 's|href="/favicon|href="/yoru/favicon|g' dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
